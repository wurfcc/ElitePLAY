<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos de Hoje - Dashboard Elite</title>
    <meta name="description" content="Acompanhe os jogos de futebol de hoje em tempo real com informações de canais e horários.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <div class="container">
            <div class="logo">
                <span class="logo-icon">⚽</span>
                <h1>Jogos de Hoje</h1>
            </div>
            <div class="date-display" id="current-date">-- de --</div>
        </div>
    </header>

    <main class="container">
        <div id="loading" class="loading-state">
            <div class="spinner"></div>
            <p>Carregando as melhores partidas...</p>
        </div>
        
        <div id="games-container">
            <!-- Dynamic content will be injected here -->
        </div>

        <div id="error-message" class="error-display hidden">
            <p>Ops! Não conseguimos carregar os jogos. Tente novamente em instantes.</p>
            <button onclick="location.reload()">Recarregar</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Dashboard Elite de Futebol</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
